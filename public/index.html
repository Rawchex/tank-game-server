<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>5v5 Tank Battle</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Inline additions for the new layout (ideally goes to style.css, but placing here for immediate testing) */
    body {
      margin: 0;
      overflow: hidden;
      background: #2c3e50;
      font-family: Arial, sans-serif;
      color: white;
    }

    #lobby-container {
      padding: 50px;
    }

    #game-container {
      position: relative;
      display: none;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 8px;
    }

    #scoreboard-ui {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      min-width: 200px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    #skills-ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 20px;
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 12px;
    }

    .skill-box {
      width: 50px;
      height: 50px;
      border: 2px solid #7f8c8d;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      position: relative;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
    }

    .skill-box.ready {
      border-color: #2ecc71;
      color: #2ecc71;
    }

    .skill-box.cooldown {
      border-color: #e74c3c;
      color: #e74c3c;
      opacity: 0.5;
    }

    .skill-tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);
      background: #34495e;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      color: white;
      z-index: 11;
    }

    .skill-box:hover .skill-tooltip {
      visibility: visible;
    }

    canvas {
      background: #34495e;
      display: block;
    }
  </style>
</head>

<body>
  <div id="lobby-container">
    <h1>5v5 Tank Battle Lobby</h1>
    <div style="margin-bottom: 20px; text-align: center;">
      <label for="player-name">Adınız:</label>
      <input type="text" id="player-name" placeholder="Oyuncu Adı" maxlength="15"
        style="padding: 5px; font-size: 16px;">
    </div>
    <div id="lobby-info">
      <div>
        <h3>Red Team</h3>
        <ul id="red-players"></ul>
        <button id="join-red">Join Red</button>
        <button id="add-bot-red" style="margin-left:5px;">Add God AI</button>
        <button id="remove-bot-red" style="margin-left:5px;">Kick God AI</button>
      </div>
      <div>
        <h3>Blue Team</h3>
        <ul id="blue-players"></ul>
        <button id="join-blue">Join Blue</button>
        <button id="add-bot-blue" style="margin-left:5px;">Add God AI</button>
        <button id="remove-bot-blue" style="margin-left:5px;">Kick God AI</button>
      </div>
    </div>
  </div>

  <div id="game-container">
    <div id="hud">
      <h2>Team Score</h2>
      <div>Kırmızı: <span id="score-red" style="color:#e74c3c; font-weight:bold;">0</span></div>
      <div>Mavi: <span id="score-blue" style="color:#3498db; font-weight:bold;">0</span></div>
    </div>

    <div id="scoreboard-ui">
      <h3 style="margin-top:0; text-align:center;">🏆 Leaderboard</h3>
      <div id="leaderboard-list"></div>
    </div>

    <div id="skills-ui">
      <div id="skill-z" class="skill-box ready">Z
        <span class="skill-tooltip">Heal (Can basar)</span>
      </div>
      <div id="skill-x" class="skill-box ready">X
        <span class="skill-tooltip">Speed Boost (Hızlandırır)</span>
      </div>
      <div id="skill-c" class="skill-box ready">C
        <span class="skill-tooltip">Rapid Fire (Seri Ateş)</span>
      </div>
    </div>

    <!-- Ses Ayarları Butonu -->
    <button id="voice-settings-btn" style="position:fixed; bottom:20px; right:20px; z-index:10; background:rgba(0,0,0,0.7); color:white; border:2px solid #7f8c8d; padding:10px; border-radius:8px; cursor:pointer;">
      🎤 Ses Ayarları
    </button>

    <!-- Ses Ayarları Modalı -->
    <div id="voice-settings-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:100; background:rgba(44, 62, 80, 0.95); padding:20px; border-radius:10px; border:2px solid #34495e; min-width:300px; max-height:80vh; overflow-y:auto; box-shadow:0 0 20px rgba(0,0,0,0.8);">
        <h2 style="margin-top:0; border-bottom:1px solid #7f8c8d; padding-bottom:10px;">🎙️ Ses & Mikrofon</h2>
        
        <div style="margin-bottom:15px;">
            <label>Master Ses: <span id="vol-display">100%</span></label><br>
            <input type="range" id="master-volume" min="0" max="1" step="0.05" value="1" style="width:100%;">
        </div>

        <div style="margin-bottom:15px; display:flex; gap:15px;">
            <label style="cursor:pointer;">
                <input type="checkbox" id="mute-mic"> Mikrofonu Kapat
            </label>
            <label style="cursor:pointer;" title="Konuşmak için 'V' tuşuna basılı tutun">
                <input type="checkbox" id="ptt-enable"> Bas-Konuş (V Tuşu)
            </label>
        </div>

        <h3 style="margin-bottom:5px;">Oyuncular</h3>
        <p style="font-size:11px; color:#bdc3c7; margin-top:0;">Tek tek susturmak için oyuncuları seçin.</p>
        <div id="voice-player-list" style="background:rgba(0,0,0,0.3); padding:10px; border-radius:5px; max-height:200px; overflow-y:auto;">
            <!-- Dinamik olarak doldurulacak -->
        </div>

        <button id="close-voice-settings" style="margin-top:20px; width:100%; padding:10px; background:#e74c3c; border:none; color:white; font-weight:bold; border-radius:5px; cursor:pointer;">
            Kapat
        </button>
    </div>

    <canvas id="gameCanvas"></canvas>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="input.js"></script>
  <script src="render.js"></script>
  <script src="voice.js"></script>
  <script src="app.js"></script>
</body>
</html>
